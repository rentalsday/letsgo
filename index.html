<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moments</title>
  
  <style>
    :root {
      --primary: #e91e63;
      --primary-dark: #c2185b;
      --accent: #4caf50;
      --accent-dark: #43a047;
      --bg: #0d1117;
      --card: #161b22;
      --text: #e6edf3;
      --text-light: #8b949e;
      --border: #30363d;
      --shadow-sm: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.5);
      --radius: 16px;
      --transition: all 0.25s ease;
    }

    [data-theme="light"] {
      --primary: #e91e63;
      --primary-dark: #c2185b;
      --accent: #4caf50;
      --accent-dark: #43a047;
      --bg: #f8f9ff;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-light: #4a4a6a;
      --border: #e0e0ff;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      line-height: 1.5;
      transition: background 0.4s, color 0.4s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(1.9rem, 7vw, 2.6rem);
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .theme-toggle {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: var(--transition);
    }

    .theme-toggle:hover { transform: scale(1.15); }

    .create-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1.1rem;
      transition: var(--transition);
    }

    .create-btn:hover {
      background: var(--primary-dark);
      transform: scale(1.05);
    }

    /* ──────────────────────────────────────
       TODAY'S WINS SECTION (kept but commented if unused)
    ────────────────────────────────────── */
    /* ... wins-section styles unchanged ... */

    /* ──────────────────────────────────────
       CREATE EVENT MODAL
    ────────────────────────────────────── */
    #create-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #create-modal.show {
      display: flex;
      opacity: 1;
    }

    .create-modal-content {
      background: var(--card);
      border-radius: var(--radius);
      width: 90%;
      max-width: 500px;
      padding: 28px;
      position: relative;
      box-shadow: var(--shadow-md);
    }

    .create-modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 2rem;
      color: var(--text-light);
      cursor: pointer;
      background: none;
      border: none;
    }

    .create-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .create-form input,
    .create-form textarea,
    .create-form select {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1.05rem;
      background: var(--card);
      color: var(--text);
    }

    .create-form textarea {
      min-height: 100px;
      resize: vertical;
    }

    .create-form input:focus,
    .create-form textarea:focus,
    .create-form select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(233,30,99,0.2);
    }

    .create-submit {
      background: var(--primary);
      color: white;
      font-weight: 700;
      padding: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.15rem;
      transition: all 0.3s ease;
    }

    .create-submit:hover {
      background: var(--primary-dark);
      transform: scale(1.03);
    }

    .create-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Rest of your original styles remain unchanged */
    /* ... filter-container, loading, events-list, signup-modal, etc. ... */
  </style>
</head>
<body data-theme="dark">

  <header>
    <h1>Moments</h1>
    <div>
      <button class="create-btn" id="createEventBtn" style="display:none;">+ Create Moment</button>
      <button class="theme-toggle" id="themeBtn" aria-label="Toggle theme">☀️</button>
    </div>
  </header>

  <div class="filter-container">
    <select id="categoryFilter">
      <option value="all">All Moments</option>
    </select>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    Loading beautiful moments...
  </div>

  <div id="events-list" style="display:none;"></div>

  <!-- Global Signup Modal (unchanged) -->
  <div id="signup-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      <form class="modal-form">
        <input id="modal-name"  placeholder="Your name *"     required>
        <input id="modal-email" placeholder="Email *"         type="email" required>
        <button type="button" class="modal-submit" id="modal-submit-btn" onclick="submitModalForm()">Blast off! 🚀</button>
      </form>
    </div>
  </div>

  <!-- New Create Event Modal -->
  <div id="create-modal">
    <div class="create-modal-content">
      <button class="create-modal-close" onclick="closeCreateModal()">×</button>
      <h2 style="margin-bottom:20px; color:var(--primary);">Create New Moment</h2>
      
      <form class="create-form" id="create-form">
        <input id="event-title"    placeholder="Event title *" required>
        <textarea id="event-desc"  placeholder="Description (optional)"></textarea>
        <input id="event-host"     placeholder="Your name / host name *" required>
        <input id="event-max"      type="number" placeholder="Max spots (optional)">
        <select id="event-category">
          <option value="Gathering">Gathering</option>
          <option value="Workshop">Workshop</option>
          <option value="Party">Party</option>
          <option value="Music">Music</option>
          <option value="Wellness">Wellness</option>
          <option value="Other">Other</option>
        </select>
        <button type="button" class="create-submit" id="create-submit-btn" onclick="submitCreateForm()">Create Moment</button>
      </form>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXQgvXwOFt9OEwDLqeFrWQS3r_xAEFNmu51FWmvl4RcxZ8s6OqS1h4VOOOTemvgwP5/exec";
    const ACCESS_CODE = "berkeley2026";   // ← CHANGE THIS to your secret code

    // Theme toggle
    const themeBtn = document.getElementById('themeBtn');
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    const initialTheme = savedTheme || 'dark';
    html.setAttribute('data-theme', initialTheme);
    themeBtn.textContent = initialTheme === 'dark' ? '☀️' : '🌙';

    themeBtn.addEventListener('click', () => {
      const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
    });

    // Check if user is authorized to create events
    const isAuthorized = localStorage.getItem("momentsCreator") === "true";
    if (isAuthorized) {
      document.getElementById("createEventBtn").style.display = "inline-block";
    } else {
      // Optional: prompt once when they try to create
      document.getElementById("createEventBtn").onclick = () => {
        if (!isAuthorized) {
          const code = prompt("Enter access code to create events:");
          if (code === ACCESS_CODE) {
            localStorage.setItem("momentsCreator", "true");
            document.getElementById("createEventBtn").style.display = "inline-block";
            openCreateModal();
          } else if (code) {
            alert("Incorrect code.");
          }
        } else {
          openCreateModal();
        }
      };
    }

    let allEvents = [];
    let currentEventId = null;

    async function loadEvents() {
      const loadingEl = document.getElementById("loading");
      const listEl = document.getElementById("events-list");
      const filterEl = document.getElementById("categoryFilter");

      try {
        const res = await fetch(`${SCRIPT_URL}?action=getEvents`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        allEvents = data.events || [];

        const categories = new Set(["all"]);
        allEvents.forEach(ev => categories.add((ev.category || "Other").toLowerCase()));

        filterEl.innerHTML = '';
        categories.forEach(cat => {
          const opt = document.createElement("option");
          opt.value = cat;
          opt.textContent = cat === "all" ? "All Moments" : cat.charAt(0).toUpperCase() + cat.slice(1);
          filterEl.appendChild(opt);
        });

        renderEvents(allEvents);
        loadingEl.style.display = "none";
        listEl.style.display = "grid";
      } catch (err) {
        loadingEl.innerHTML = `<p style="color:#e74c3c; font-size:1.2rem;">Couldn't load events… please try again later 🌧️</p>`;
      }
    }

    function renderEvents(events) {
      const container = document.getElementById("events-list");
      container.innerHTML = "";

      events.forEach((ev, i) => {
        const div = document.createElement("div");
        div.className = "event";
        div.style.animationDelay = `${i * 100}ms`;

        div.innerHTML = `
          <div class="event-header">
            <div class="title">${ev.title} ${getEmoji(ev.title)}</div>
            <div class="meta">
              with <strong>${ev.host}</strong> 
              • ${ev.count} joined 
              ${ev.max ? `(max ${ev.max})` : ""} 🔥
            </div>
            <div class="desc">${ev.desc || ""}</div>
            <button class="action-btn" onclick="openSignupModal('${ev.id}', '${ev.title.replace(/'/g, "\\'")}')">I'm in! 🎉</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // ─── Signup logic (unchanged) ───
    function openSignupModal(eventId, eventTitle) {
      currentEventId = eventId;
      document.getElementById("modal-name").value = "";
      document.getElementById("modal-email").value = "";
      document.getElementById("signup-modal").classList.add("show");
    }

    function closeModal() {
      document.getElementById("signup-modal").classList.remove("show");
      currentEventId = null;
    }

    document.getElementById("signup-modal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("signup-modal")) closeModal();
    });

    async function submitModalForm() { /* unchanged */ 
      // ... your existing signup code ...
    }

    // ─── Create Event Modal logic ───
    function openCreateModal() {
      document.getElementById("create-modal").classList.add("show");
      document.getElementById("create-form").reset();
    }

    function closeCreateModal() {
      document.getElementById("create-modal").classList.remove("show");
    }

    document.getElementById("create-modal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("create-modal")) closeCreateModal();
    });

    async function submitCreateForm() {
      const title    = document.getElementById("event-title").value.trim();
      const desc     = document.getElementById("event-desc").value.trim();
      const host     = document.getElementById("event-host").value.trim();
      const max      = document.getElementById("event-max").value.trim();
      const category = document.getElementById("event-category").value;
      const btn      = document.getElementById("create-submit-btn");

      if (!title || !host) {
        alert("Title and host name are required.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Creating...";

      const params = new URLSearchParams({
        action:   "createEvent",
        title,
        host,
        desc,
        max,
        category
      });

      try {
        const res = await fetch(`${SCRIPT_URL}?${params}`);
        const result = await res.json();

        if (result.success) {
          alert("Moment created! 🎉");
          closeCreateModal();
          loadEvents();
        } else {
          alert("Failed to create: " + (result.message || "unknown error"));
        }
      } catch (err) {
        alert("Network error – try again");
      } finally {
        btn.disabled = false;
        btn.textContent = "Create Moment";
      }
    }

    document.getElementById("categoryFilter").addEventListener("change", (e) => {
      const selected = e.target.value.toLowerCase();
      const filtered = selected === "all" 
        ? allEvents 
        : allEvents.filter(ev => (ev.category || "Other").toLowerCase() === selected);
      renderEvents(filtered);
    });

    function getEmoji(title) {
      const t = title.toLowerCase();
      if (t.includes("sing") || t.includes("song")) return "🎤🎶";
      if (t.includes("prayer") || t.includes("meditat")) return "🙏✨";
      if (t.includes("yoga") || t.includes("move")) return "🧘‍♀️💫";
      return "🌟";
    }

    loadEvents();
  </script>
</body>
</html>
