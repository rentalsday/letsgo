<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Let's Go! – Turn your day into a moment to connect 🌈🙏</title>
  
  <style>
    :root {
      --primary: #e91e63;     /* warm pink-red for energy & love */
      --primary-dark: #c2185b;
      --accent: #4caf50;      /* green for join/action */
      --accent-dark: #43a047;
      --bg: #f8f9ff;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-light: #4a4a6a;
      --border: #e0e0ff;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
      --radius: 16px;
      --transition: all 0.22s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(to bottom, var(--bg), #f0f2ff);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      line-height: 1.5;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: clamp(1.8rem, 7vw, 2.5rem);
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 1.1rem;
      color: var(--text-light);
      opacity: 0.9;
    }

    #events-list {
      display: grid;
      gap: 20px;
      max-width: 680px;
      margin: 0 auto;
    }

    .event {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s forwards;
    }

    .event:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .event-header {
      padding: 20px 20px 12px;
    }

    .title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }

    .meta {
      font-size: 0.95rem;
      color: var(--text-light);
      margin-bottom: 10px;
    }

    .desc {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.45;
    }

    .action-btn {
      display: block;
      width: 100%;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      margin-top: 8px;
    }

    .action-btn:hover,
    .action-btn:active {
      background: var(--accent-dark);
      transform: scale(1.02);
    }

    .signup-form {
      padding: 0 20px 20px;
      display: none;
      background: #f9faff;
      border-top: 1px solid var(--border);
    }

    .signup-form.show {
      display: block;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin: 10px 0;
      border: 1.5px solid #d0d0ff;
      border-radius: 12px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(233, 30, 99, 0.15);
    }

    .submit-btn {
      background: var(--primary);
      color: white;
      font-weight: 600;
      padding: 14px;
      border: none;
      border-radius: 12px;
      width: 100%;
      font-size: 1.05rem;
      cursor: pointer;
      margin-top: 12px;
      transition: var(--transition);
    }

    .submit-btn:hover,
    .submit-btn:active {
      background: var(--primary-dark);
      transform: scale(1.02);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Wider screens — cards become more spacious */
    @media (min-width: 640px) {
      body { padding: 40px 24px; }
      #events-list { grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }
      .event-header { padding: 24px 28px 16px; }
      .title { font-size: 1.55rem; }
    }

    @media (min-width: 900px) {
      h1 { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Let's Go! 🌟</h1>
    <p class="tagline">Turn your day into a moment to connect 🌈🙏</p>
  </header>

  <div id="events-list"></div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWOQ79xr1zNvPNGKJHSDKQlcumew0tfW0ZYX_JUAzEJvi-dO79Gmb5mHmD64pEtqS3/exec";

    async function loadEvents() {
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getEvents`);
        if (!res.ok) throw new Error("Network error");
        const data = await res.json();
        const container = document.getElementById("events-list");
        container.innerHTML = "";

        data.events.forEach((ev, index) => {
          const div = document.createElement("div");
          div.className = "event";
          div.style.animationDelay = `${index * 80}ms`;

          div.innerHTML = `
            <div class="event-header">
              <div class="title">${ev.title} ${getEmoji(ev.title)}</div>
              <div class="meta">with <strong>${ev.host}</strong> • ${ev.count} people signed up ${ev.max ? ` (max ${ev.max})` : ""} 🔥</div>
              <div class="desc">${ev.desc || ""}</div>
              <button class="action-btn" onclick="toggleForm('form-${ev.id}')">Sign up now! ➡️</button>
            </div>
            
            <div id="form-${ev.id}" class="signup-form">
              <input id="name-${ev.id}" placeholder="Your name *" required>
              <input id="phone-${ev.id}" placeholder="Phone number" type="tel">
              <input id="email-${ev.id}" placeholder="Email *" type="email" required>
              <button class="submit-btn" onclick="submitSignup(${ev.id})">Join this moment ✨</button>
            </div>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        document.getElementById("events-list").innerHTML = `<p style="text-align:center; color:#c00;">Couldn't load events… please try again 🌧️</p>`;
      }
    }

    function getEmoji(title) {
      const t = title.toLowerCase();
      if (t.includes("sing") || t.includes("song")) return "🎤🎶";
      if (t.includes("prayer") || t.includes("meditat")) return "🙏✨";
      if (t.includes("yoga") || t.includes("move")) return "🧘‍♀️💫";
      if (t.includes("bible") || t.includes("study")) return "📖❤️";
      return "🌟";
    }

    function toggleForm(id) {
      const form = document.getElementById(id);
      form.classList.toggle("show");
      
      // Optional: close other open forms (better mobile UX)
      document.querySelectorAll('.signup-form.show').forEach(f => {
        if (f.id !== id) f.classList.remove("show");
      });
    }

    async function submitSignup(eventId) {
      const nameEl  = document.getElementById(`name-${eventId}`);
      const phoneEl = document.getElementById(`phone-${eventId}`);
      const emailEl = document.getElementById(`email-${eventId}`);

      const name  = nameEl.value.trim();
      const phone = phoneEl.value.trim();
      const email = emailEl.value.trim();

      if (!name || !email) {
        alert("Please fill in your name and email 🌸");
        return;
      }

      const url = `${SCRIPT_URL}?action=signup&eventId=${eventId}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&email=${encodeURIComponent(email)}`;

      try {
        const res = await fetch(url);
        const result = await res.json();
        if (result.success) {
          alert("You're in! Thank you for joining 🙌🎉");
          nameEl.value = phoneEl.value = emailEl.value = "";
          toggleForm(`form-${eventId}`); // close form
          loadEvents(); // refresh counts
        } else {
          alert("Something went wrong: " + (result.error || "try again"));
        }
      } catch (e) {
        alert("Connection issue — please check your internet 🌐");
      }
    }

    // Initial load
    loadEvents();
  </script>
</body>
</html>
