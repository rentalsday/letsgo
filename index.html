<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Let's Go! 🌈🙏</title>
  
  <style>
    :root {
      --primary: #e91e63;
      --primary-dark: #c2185b;
      --accent: #4caf50;
      --accent-dark: #43a047;
      --bg: #0d1117;
      --card: #161b22;
      --text: #e6edf3;
      --text-light: #8b949e;
      --border: #30363d;
      --shadow-sm: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.5);
      --radius: 16px;
      --transition: all 0.25s ease;
    }

    [data-theme="light"] {
      --primary: #e91e63;
      --primary-dark: #c2185b;
      --accent: #4caf50;
      --accent-dark: #43a047;
      --bg: #f8f9ff;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-light: #4a4a6a;
      --border: #e0e0ff;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      line-height: 1.5;
      transition: background 0.4s, color 0.4s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(1.9rem, 7vw, 2.6rem);
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .theme-toggle {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: var(--transition);
    }

    .theme-toggle:hover { transform: scale(1.15); }

    .filter-container {
      margin: 0 auto 24px;
      max-width: 720px;
      text-align: center;
    }

    select {
      padding: 12px 16px;
      font-size: 1.05rem;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      width: 100%;
      max-width: 320px;
      cursor: pointer;
    }

    #loading {
      text-align: center;
      font-size: 1.3rem;
      color: var(--text-light);
      padding: 80px 0;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid var(--border);
      border-top: 5px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #events-list {
      display: grid;
      gap: 20px;
      max-width: 720px;
      margin: 0 auto;
    }

    .event {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.7s forwards;
    }

    .event:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }

    .event-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #222;
    }

    .event-header {
      padding: 20px;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 0.95rem;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .desc {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 16px;
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
    }

    .action-btn:hover { background: var(--accent-dark); transform: scale(1.02); }

    .signup-form {
      padding: 0 20px 24px;
      display: none;
      background: rgba(0,0,0,0.03);
      border-top: 1px solid var(--border);
    }

    [data-theme="light"] .signup-form { background: rgba(0,0,0,0.02); }

    .signup-form.show { display: block; }

    input {
      width: 100%;
      padding: 14px 16px;
      margin: 10px 0;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      background: var(--card);
      color: var(--text);
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(233,30,99,0.2);
    }

    .submit-btn {
      background: var(--primary);
      color: white;
      font-weight: 600;
      padding: 14px;
      border: none;
      border-radius: 12px;
      width: 100%;
      font-size: 1.05rem;
      cursor: pointer;
      margin-top: 12px;
      transition: var(--transition);
    }

    .submit-btn:hover { background: var(--primary-dark); transform: scale(1.02); }

    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    @media (min-width: 640px) {
      body { padding: 32px 24px; }
      #events-list { grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); }
      .event-img { height: 200px; }
    }
  </style>
</head>
<body data-theme="dark">

  <header>
    <h1>Let's Go! 🌟</h1>
    <button class="theme-toggle" id="themeBtn" aria-label="Toggle theme">☀️</button>
  </header>

  <div class="filter-container">
    <select id="categoryFilter">
      <option value="all">All Moments</option>
    </select>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    Loading beautiful moments...
  </div>

  <div id="events-list" style="display:none;"></div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyWOQ79xr1zNvPNGKJHSDKQlcumew0tfW0ZYX_JUAzEJvi-dO79Gmb5mHmD64pEtqS3/exec";

    // Theme (dark mode default)
    const themeBtn = document.getElementById('themeBtn');
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    const initialTheme = savedTheme || 'dark';
    html.setAttribute('data-theme', initialTheme);
    themeBtn.textContent = initialTheme === 'dark' ? '☀️' : '🌙';

    themeBtn.addEventListener('click', () => {
      const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
    });

    // Single fallback image (used when event has no imageUrl)
    const DEFAULT_IMAGE = "https://thumbs.dreamstime.com/b/diverse-people-circle-hands-together-community-unity-support-friendship-connection-group-embrace-399070259.jpg";

    let allEvents = [];

    async function loadEvents() {
      const loadingEl = document.getElementById("loading");
      const listEl = document.getElementById("events-list");
      const filterEl = document.getElementById("categoryFilter");

      try {
        const res = await fetch(`${SCRIPT_URL}?action=getEvents`);
        if (!res.ok) throw new Error("Network response was not ok");
        const data = await res.json();
        allEvents = data.events || [];

        // Populate category filter dynamically
        const categories = new Set(["all"]);
        allEvents.forEach(ev => {
          const cat = (ev.category || "Other").toLowerCase();
          categories.add(cat);
        });

        filterEl.innerHTML = '';
        categories.forEach(cat => {
          const option = document.createElement("option");
          option.value = cat;
          option.textContent = cat === "all" ? "All Moments" : cat.charAt(0).toUpperCase() + cat.slice(1);
          filterEl.appendChild(option);
        });

        renderEvents(allEvents);
        loadingEl.style.display = "none";
        listEl.style.display = "grid";
      } catch (err) {
        loadingEl.innerHTML = `<p style="color:#e74c3c; font-size:1.2rem;">Couldn't load events… please try again later 🌧️</p>`;
        console.error(err);
      }
    }

    function renderEvents(events) {
      const container = document.getElementById("events-list");
      container.innerHTML = "";

      events.forEach((ev, i) => {
        const imgSrc = ev.imageUrl || DEFAULT_IMAGE;

        const div = document.createElement("div");
        div.className = "event";
        div.style.animationDelay = `${i * 100}ms`;

        div.innerHTML = `
          <img class="event-img" src="${imgSrc}" alt="${ev.title}" loading="lazy" onerror="this.src='${DEFAULT_IMAGE}'">
          <div class="event-header">
            <div class="title">${ev.title} ${getEmoji(ev.title)}</div>
            <div class="meta">
              with <strong>${ev.host}</strong> 
              • ${ev.count} joined
            </div>
            <button class="action-btn" onclick="toggleForm('form-${ev.id}')">Sign up now! ➡️</button>
          </div>
          <div id="form-${ev.id}" class="signup-form">
            <input id="name-${ev.id}"  placeholder="Your name *"     required>
            <input id="phone-${ev.id}" placeholder="Phone number"    type="tel">
            <input id="email-${ev.id}" placeholder="Email *"         type="email" required>
            <button class="submit-btn" onclick="submitSignup(${ev.id})">Join this moment ✨</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // Category filter handler
    document.getElementById("categoryFilter").addEventListener("change", (e) => {
      const selected = e.target.value.toLowerCase();
      const filtered = selected === "all" 
        ? allEvents 
        : allEvents.filter(ev => (ev.category || "Other").toLowerCase() === selected);
      renderEvents(filtered);
    });

    function getEmoji(title) {
      const t = title.toLowerCase();
      if (t.includes("sing") || t.includes("song") || t.includes("choir")) return "🎤🎶";
      if (t.includes("prayer") || t.includes("meditat") || t.includes("spiritual")) return "🙏✨";
      if (t.includes("yoga") || t.includes("move")) return "🧘‍♀️💫";
      return "🌟";
    }

    function toggleForm(id) {
      const form = document.getElementById(id);
      const isShowing = form.classList.toggle("show");
      if (isShowing) {
        // Close other open forms (better mobile UX)
        document.querySelectorAll('.signup-form.show').forEach(f => {
          if (f.id !== id) f.classList.remove("show");
        });
      }
    }

    async function submitSignup(eventId) {
      const nameEl  = document.getElementById(`name-${eventId}`);
      const phoneEl = document.getElementById(`phone-${eventId}`);
      const emailEl = document.getElementById(`email-${eventId}`);

      const name  = nameEl.value.trim();
      const phone = phoneEl.value.trim();
      const email = emailEl.value.trim();

      if (!name || !email) {
        alert("Please fill in your name and email 🌸");
        return;
      }

      const url = `${SCRIPT_URL}?action=signup&eventId=${eventId}&name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&email=${encodeURIComponent(email)}`;

      try {
        const res = await fetch(url);
        const result = await res.json();

        if (result.success) {
          alert("Thank you! You're signed up — check your email for confirmation 🙌✨");
          nameEl.value = phoneEl.value = emailEl.value = "";
          toggleForm(`form-${eventId}`);
          loadEvents(); // refresh list & counts
        } else {
          alert("Sorry — " + (result.error || "something went wrong. Please try again."));
        }
      } catch (err) {
        alert("Connection issue — please check your internet 🌐");
        console.error(err);
      }
    }

    // Initial load
    loadEvents();
  </script>
</body>
</html>
