<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moments</title>
  
  <style>
    :root {
      --primary: #e91e63;
      --primary-dark: #c2185b;
      --accent: #4caf50;
      --accent-dark: #43a047;
      --bg: #0d1117;
      --card: #161b22;
      --text: #e6edf3;
      --text-light: #8b949e;
      --border: #30363d;
      --shadow-sm: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.5);
      --radius: 16px;
      --transition: all 0.25s ease;
    }

    [data-theme="light"] {
      --primary: #e91e63;
      --primary-dark: #c2185b;
      --accent: #4caf50;
      --accent-dark: #43a047;
      --bg: #f8f9ff;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-light: #4a4a6a;
      --border: #e0e0ff;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      line-height: 1.5;
      transition: background 0.4s, color 0.4s;
    }

    .app-title-container {
      text-align: center;
      margin: 0 auto 32px;
      padding: 16px 0 24px;
    }

    h1 {
      font-size: clamp(3.8rem, 12vw, 7.2rem);
      font-weight: 900;
      letter-spacing: -1.5px;
      line-height: 0.92;
      background: linear-gradient(90deg, #ff3366, #cc33ff, #ff66cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(255,51,102,0.6), 0 0 40px rgba(204,51,255,0.4);
      filter: drop-shadow(0 8px 16px rgba(255,51,102,0.35));
      transition: all 0.4s ease;
    }

    h1:hover { transform: scale(1.03); text-shadow: 0 0 30px rgba(255,51,102,0.9), 0 0 60px rgba(204,51,255,0.7); }

    .theme-toggle {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      font-size: 1.9rem;
      cursor: pointer;
      padding: 10px;
      border-radius: 50%;
      transition: all 0.3s ease;
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      backdrop-filter: blur(8px);
      color: var(--text);
    }

    .theme-toggle:hover {
      transform: scale(1.15) rotate(20deg);
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .create-btn {
      background: var(--primary);
      color: white;
      font-weight: 700;
      font-size: 1.3rem;
      padding: 14px 32px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 16px auto 40px;
      display: block;
      transition: all 0.3s ease;
    }

    .create-btn:hover {
      background: var(--primary-dark);
      transform: scale(1.05);
    }

    #events-list {
      display: grid;
      gap: 20px;
      max-width: 720px;
      margin: 0 auto;
    }

    .event {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.7s forwards;
    }

    .event:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }

    .event-header {
      padding: 20px;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 0.95rem;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .desc {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .desc a {
      color: var(--primary);
      text-decoration: underline;
    }

    .desc a:hover { color: var(--primary-dark); }

    .action-btn {
      width: 100%;
      padding: 18px 12px;
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      font-weight: 900;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .action-btn.joined {
      background: #2e7d32;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .action-btn:hover:not(.joined) {
      transform: scale(1.06) translateY(-3px);
      box-shadow: 0 10px 25px rgba(76,175,80,0.5);
    }

    /* ── Create Event Modal ── */
    #create-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #create-modal.show {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      background: var(--card);
      border-radius: var(--radius);
      width: 90%;
      max-width: 460px;
      padding: 28px;
      position: relative;
      box-shadow: var(--shadow-md);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    #create-modal.show .modal-content { transform: scale(1); }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 1.8rem;
      color: var(--text-light);
      cursor: pointer;
      background: none;
      border: none;
    }

    .modal-form label {
      display: block;
      margin: 16px 0 6px;
      font-weight: 600;
      color: var(--text-light);
    }

    .modal-form input,
    .modal-form textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      background: var(--card);
      color: var(--text);
      resize: vertical;
      min-height: 80px;
    }

    .modal-form input:focus,
    .modal-form textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(233,30,99,0.2);
    }

    .modal-submit {
      background: var(--primary-dark);
      color: white;
      font-weight: 900;
      font-size: 1.4rem;
      padding: 18px;
      border: none;
      border-radius: var(--radius);
      width: 100%;
      cursor: pointer;
      margin-top: 24px;
      transition: all 0.3s ease;
    }

    .modal-submit:hover {
      transform: scale(1.04);
      box-shadow: 0 10px 20px rgba(194,24,91,0.4);
    }

    .modal-submit.loading {
      background: #ad1457;
      cursor: not-allowed;
    }

    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    @media (min-width: 640px) {
      body { padding: 32px 24px; }
      #events-list { grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); }
      .app-title-container { margin: 0 auto 48px; }
    }
  </style>
</head>
<body data-theme="dark">

  <button class="theme-toggle" id="themeBtn" aria-label="Toggle theme">☀️</button>

  <div class="app-title-container">
    <h1>Moments</h1>
    <button class="create-btn" id="createEventBtn">Got a moment?</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    Loading beautiful moments...
  </div>

  <div id="events-list" style="display:none;"></div>

  <!-- Create Event Modal -->
  <div id="create-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeCreateModal()">×</button>
      
      <form class="modal-form" id="create-form">
        <label for="event-title">Title *</label>
        <input id="event-title" required placeholder="e.g. Sunset Yoga on the Hill">

        <label for="event-host">Host *</label>
        <input id="event-host" required placeholder="Your name or group">

        <label for="event-desc">Description</label>
        <textarea id="event-desc" rows="4" placeholder="What’s happening? Any details, links, vibes..."></textarea>

        <label for="event-end-date">Ends on *</label>
        <input id="event-end-date" type="date" required>

        <button type="button" class="modal-submit" id="create-submit-btn" onclick="submitNewEvent()">Create Moment ✨</button>
      </form>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8vatwoJQtwPIsTyYYlc5f-DDwe58WLMeVE9vc7wsauUi5b58dYzNHaaxD7WqYkSvU/exec";

    // Theme toggle
    const themeBtn = document.getElementById('themeBtn');
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    const initialTheme = savedTheme || 'dark';
    html.setAttribute('data-theme', initialTheme);
    themeBtn.textContent = initialTheme === 'dark' ? '☀️' : '🌙';

    themeBtn.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const newTheme = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
    });

    // Create modal controls
    const createBtn = document.getElementById('createEventBtn');
    const createModal = document.getElementById('create-modal');

    createBtn.addEventListener('click', () => {
      createModal.classList.add('show');
      document.getElementById('create-form').reset();
    });

    function closeCreateModal() {
      createModal.classList.remove('show');
    }

    createModal.addEventListener('click', e => {
      if (e.target === createModal) closeCreateModal();
    });

    async function submitNewEvent() {
      const title    = document.getElementById('event-title').value.trim();
      const host     = document.getElementById('event-host').value.trim();
      const desc     = document.getElementById('event-desc').value.trim();
      const endDate  = document.getElementById('event-end-date').value;
      const submitBtn = document.getElementById('create-submit-btn');

      if (!title || !host || !endDate) {
        alert("Please fill in Title, Host, and End Date 🌱");
        return;
      }

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating...";

      const params = new URLSearchParams({
        action: 'createEvent',
        title:   encodeURIComponent(title),
        host:    encodeURIComponent(host),
        desc:    encodeURIComponent(desc),
        endDate: endDate
      });

      try {
        const res = await fetch(`${SCRIPT_URL}?${params}`);
        const result = await res.json();

        if (result.success) {
          alert("Moment created! 🎉 It will appear soon.");
          closeCreateModal();
          loadEvents(); // refresh list
        } else {
          alert("Something went wrong: " + (result.error || "Unknown issue"));
        }
      } catch (err) {
        alert("Connection error — please try again");
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Moment ✨";
      }
    }

    let allEvents = [];

    async function loadEvents() {
      const loadingEl = document.getElementById("loading");
      const listEl = document.getElementById("events-list");

      try {
        const res = await fetch(`${SCRIPT_URL}?action=getEvents`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        allEvents = data.events || [];
        renderEvents(allEvents);
        loadingEl.style.display = "none";
        listEl.style.display = "grid";
      } catch (err) {
        loadingEl.innerHTML = `<p style="color:#e74c3c; font-size:1.2rem;">Couldn't load events… please try again later 🌧️</p>`;
      }
    }

    function renderEvents(events) {
      const container = document.getElementById("events-list");
      container.innerHTML = "";

      events.forEach((ev, i) => {
        const div = document.createElement("div");
        div.className = "event";
        div.style.animationDelay = `${i * 100}ms`;

        const safeDesc = ev.desc ? autoLink(ev.desc) : "";

        div.innerHTML = `
          <div class="event-header">
            <div class="title">${ev.title} ${getEmoji(ev.title)}</div>
            <div class="meta">
              with <strong>${ev.host}</strong> 
              • <span class="join-count">${ev.count}</span> joined 
              ${ev.max ? `(max ${ev.max})` : ""} 🔥
            </div>
            <div class="desc">${safeDesc}</div>
            <button class="action-btn" data-event-id="${ev.id}">
              I'm in! 🎉
            </button>
          </div>
        `;
        container.appendChild(div);

        const btn = div.querySelector('.action-btn');
        btn.addEventListener('click', () => handleJoinClick(btn, ev.id));
      });
    }

    function autoLink(text) {
      const urlRegex = /(https?:\/\/[^\s<>"']+|www\.[^\s<>"']+)/gi;
      return text.replace(urlRegex, url => {
        const href = url.startsWith('http') ? url : 'https://' + url;
        return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
      });
    }

    async function handleJoinClick(btn, eventId) {
      if (btn.classList.contains('joined')) return;

      const countEl = btn.closest('.event').querySelector('.join-count');
      const currentCount = parseInt(countEl.textContent) || 0;

      btn.disabled = true;
      btn.classList.add('joined');
      btn.textContent = "Joined ✅";

      try {
        const url = `${SCRIPT_URL}?action=signup&eventId=${eventId}&name=QuickJoin&phone=&email=quick@join.com`;
        const res = await fetch(url);
        const result = await res.json();

        if (result.success) {
          countEl.textContent = currentCount + 1;
        } else {
          revertButton();
          alert("Couldn't join — please try again");
        }
      } catch (err) {
        revertButton();
        alert("Connection issue — try again later");
      }

      function revertButton() {
        btn.disabled = false;
        btn.classList.remove('joined');
        btn.textContent = "I'm in! 🎉";
      }
    }

    function getEmoji(title) {
      const t = title.toLowerCase();
      if (t.includes("sing") || t.includes("song")) return "🎤🎶";
      if (t.includes("prayer") || t.includes("meditat")) return "🙏✨";
      if (t.includes("yoga") || t.includes("move")) return "🧘‍♀️💫";
      return "🌟";
    }

    loadEvents();
  </script>
</body>
</html>
