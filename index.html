<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moments</title>
  
  <style>
    :root {
      --primary: #e91e63;
      --primary-dark: #c2185b;
      --accent: #4caf50;
      --accent-dark: #43a047;
      --bg: #0d1117;
      --card: #161b22;
      --text: #e6edf3;
      --text-light: #8b949e;
      --border: #30363d;
      --shadow-sm: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.5);
      --radius: 16px;
      --transition: all 0.25s ease;
    }

    [data-theme="light"] {
      --primary: #e91e63;
      --primary-dark: #c2185b;
      --accent: #4caf50;
      --accent-dark: #43a047;
      --bg: #f8f9ff;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-light: #4a4a6a;
      --border: #e0e0ff;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      line-height: 1.5;
      transition: background 0.4s, color 0.4s;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(1.9rem, 7vw, 2.6rem);
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .theme-toggle {
      background: none;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: var(--transition);
    }

    .theme-toggle:hover { transform: scale(1.15); }

    /* ──────────────────────────────────────
       TODAY'S WINS SECTION
    ────────────────────────────────────── */
    #wins-section {
      margin: 0 auto 40px;
      max-width: 720px;
      text-align: center;
    }

    #wins-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    #wins-feed {
      height: 220px;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      border-radius: var(--radius);
      background: linear-gradient(to bottom, rgba(76,175,80,0.05), rgba(76,175,80,0.02));
      border: 1px solid var(--border);
      box-shadow: inset 0 2px 10px rgba(76,175,80,0.1);
    }

    .win-message {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-size: 1.35rem;
      font-weight: 500;
      text-align: center;
      opacity: 0;
      transform: translateY(30px);
      transition: all 1.4s ease;
      color: var(--text);
      line-height: 1.45;
    }

    .win-message.show {
      opacity: 1;
      transform: translateY(0);
    }

    .win-emoji {
      font-size: 2rem;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    .win-meta {
      font-size: 0.95rem;
      color: var(--text-light);
      margin-top: 12px;
      opacity: 0.85;
    }

    #wins-share-btn {
      background: var(--accent);
      color: white;
      font-weight: 700;
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      margin: 0 auto;
      display: block;
    }

    #wins-share-btn:hover {
      background: var(--accent-dark);
      transform: scale(1.05);
    }

    /* ──────────────────────────────────────
       SHARE WINS MODAL
    ────────────────────────────────────── */
    #wins-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #wins-modal.show {
      display: flex;
      opacity: 1;
    }

    .wins-modal-content {
      background: var(--card);
      border-radius: var(--radius);
      width: 90%;
      max-width: 480px;
      padding: 28px;
      position: relative;
      box-shadow: var(--shadow-md);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    #wins-modal.show .wins-modal-content {
      transform: scale(1);
    }

    .wins-modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 2rem;
      color: var(--text-light);
      cursor: pointer;
      background: none;
      border: none;
    }

    .wins-modal-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .wins-modal-form input,
    .wins-modal-form textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1.05rem;
      background: var(--card);
      color: var(--text);
    }

    .wins-modal-form textarea {
      min-height: 100px;
      resize: vertical;
    }

    .wins-modal-form input:focus,
    .wins-modal-form textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(76,175,80,0.2);
    }

    .wins-modal-submit {
      background: var(--accent);
      color: white;
      font-weight: 700;
      padding: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.15rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .wins-modal-submit:hover {
      background: var(--accent-dark);
      transform: scale(1.03);
    }

    .wins-modal-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .wins-modal-submit.loading::after {
      content: "";
      width: 24px;
      height: 24px;
      border: 4px solid white;
      border-top: 4px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    /* ──────────────────────────────────────
       REST OF YOUR STYLES (unchanged)
    ────────────────────────────────────── */
    .filter-container {
      margin: 0 auto 24px;
      max-width: 720px;
      text-align: center;
    }

    select {
      padding: 12px 16px;
      font-size: 1.05rem;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      width: 100%;
      max-width: 320px;
      cursor: pointer;
    }

    #loading {
      text-align: center;
      font-size: 1.3rem;
      color: var(--text-light);
      padding: 80px 0;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid var(--border);
      border-top: 5px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #events-list {
      display: grid;
      gap: 20px;
      max-width: 720px;
      margin: 0 auto;
    }

    .event {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.7s forwards;
    }

    .event:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }

    .event-header {
      padding: 20px;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 0.95rem;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .desc {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 16px;
    }

    .action-btn {
      width: 100%;
      padding: 18px 12px;
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      font-weight: 900;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .action-btn:hover {
      transform: scale(1.06) translateY(-3px);
      box-shadow: 0 10px 25px rgba(76,175,80,0.5);
    }

    #signup-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #signup-modal.show {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      background: var(--card);
      border-radius: var(--radius);
      width: 90%;
      max-width: 420px;
      padding: 24px;
      position: relative;
      box-shadow: var(--shadow-md);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    #signup-modal.show .modal-content {
      transform: scale(1);
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 1.8rem;
      color: var(--text-light);
      cursor: pointer;
      background: none;
      border: none;
    }

    .modal-form input {
      width: 100%;
      padding: 14px 16px;
      margin: 12px 0;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      background: var(--card);
      color: var(--text);
    }

    .modal-form input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(233,30,99,0.2);
    }

    .modal-submit {
      background: var(--primary-dark);
      color: white;
      font-weight: 900;
      font-size: clamp(1.5rem, 6vw, 2.2rem);
      padding: 20px 12px;
      border: none;
      border-radius: var(--radius);
      width: 100%;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.3s ease;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .modal-submit:hover {
      transform: scale(1.08) translateY(-4px);
      box-shadow: 0 12px 30px rgba(194,24,91,0.6);
    }

    .modal-submit.loading {
      background: #ad1457;
      cursor: not-allowed;
    }

    .modal-submit.loading::after {
      content: "";
      width: 28px;
      height: 28px;
      border: 4px solid white;
      border-top: 4px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

    @media (min-width: 640px) {
      body { padding: 32px 24px; }
      #events-list { grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); }
    }
  </style>
</head>
<body data-theme="dark">

  <header>
    <h1>Moments</h1>
    <button class="theme-toggle" id="themeBtn" aria-label="Toggle theme">☀️</button>
  </header>



  <div class="filter-container">
    <select id="categoryFilter">
      <option value="all">All Moments</option>
    </select>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    Loading beautiful moments...
  </div>

  <div id="events-list" style="display:none;"></div>

  <!-- Global Signup Modal -->
  <div id="signup-modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      
      <form class="modal-form">
        <input id="modal-name"  placeholder="Your name *"     required>
        <input id="modal-email" placeholder="Email *"         type="email" required>
        <button type="button" class="modal-submit" id="modal-submit-btn" onclick="submitModalForm()">Blast off! 🚀</button>
      </form>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXQgvXwOFt9OEwDLqeFrWQS3r_xAEFNmu51FWmvl4RcxZ8s6OqS1h4VOOOTemvgwP5/exec";

    // Theme toggle (dark default)
    const themeBtn = document.getElementById('themeBtn');
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    const initialTheme = savedTheme || 'dark';
    html.setAttribute('data-theme', initialTheme);
    themeBtn.textContent = initialTheme === 'dark' ? '☀️' : '🌙';

    themeBtn.addEventListener('click', () => {
      const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
    });



    // ──────────────────────────────────────
    // ORIGINAL EVENTS & SIGNUP CODE (unchanged)
    // ──────────────────────────────────────

    let allEvents = [];
    let currentEventId = null;

    async function loadEvents() {
      const loadingEl = document.getElementById("loading");
      const listEl = document.getElementById("events-list");
      const filterEl = document.getElementById("categoryFilter");

      try {
        const res = await fetch(`${SCRIPT_URL}?action=getEvents`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        allEvents = data.events || [];

        const categories = new Set(["all"]);
        allEvents.forEach(ev => categories.add((ev.category || "Other").toLowerCase()));

        filterEl.innerHTML = '';
        categories.forEach(cat => {
          const opt = document.createElement("option");
          opt.value = cat;
          opt.textContent = cat === "all" ? "All Moments" : cat.charAt(0).toUpperCase() + cat.slice(1);
          filterEl.appendChild(opt);
        });

        renderEvents(allEvents);
        loadingEl.style.display = "none";
        listEl.style.display = "grid";
      } catch (err) {
        loadingEl.innerHTML = `<p style="color:#e74c3c; font-size:1.2rem;">Couldn't load events… please try again later 🌧️</p>`;
      }
    }

    function renderEvents(events) {
      const container = document.getElementById("events-list");
      container.innerHTML = "";

      events.forEach((ev, i) => {
        const div = document.createElement("div");
        div.className = "event";
        div.style.animationDelay = `${i * 100}ms`;

        div.innerHTML = `
          <div class="event-header">
            <div class="title">${ev.title} ${getEmoji(ev.title)}</div>
            <div class="meta">
              with <strong>${ev.host}</strong> 
              • ${ev.count} joined 
              ${ev.max ? `(max ${ev.max})` : ""} 🔥
            </div>
            <div class="desc">${ev.desc || ""}</div>
            <button class="action-btn" onclick="openSignupModal('${ev.id}', '${ev.title.replace(/'/g, "\\'")}')">I'm in! 🎉</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function openSignupModal(eventId, eventTitle) {
      currentEventId = eventId;
      document.getElementById("modal-name").value = "";
      document.getElementById("modal-email").value = "";
      document.getElementById("signup-modal").classList.add("show");
    }

    function closeModal() {
      document.getElementById("signup-modal").classList.remove("show");
      currentEventId = null;
    }

    document.getElementById("signup-modal").addEventListener("click", (e) => {
      if (e.target === document.getElementById("signup-modal")) {
        closeModal();
      }
    });

    async function submitModalForm() {
      if (!currentEventId) return;

      const name  = document.getElementById("modal-name").value.trim();
      const email = document.getElementById("modal-email").value.trim();
      const submitBtn = document.getElementById("modal-submit-btn");

      if (!name || !email) {
        alert("Please fill in your name and email 🌸");
        return;
      }

      submitBtn.classList.add("loading");
      submitBtn.disabled = true;
      submitBtn.innerHTML = "";

      const url = `${SCRIPT_URL}?action=signup&eventId=${currentEventId}&name=${encodeURIComponent(name)}&phone=&email=${encodeURIComponent(email)}`;

      try {
        const res = await fetch(url);
        const result = await res.json();

        if (result.success) {
          alert("You're in! 🙌✨");
          closeModal();
          loadEvents();
        } else {
          alert("Sorry — something went wrong. Try again.");
        }
      } catch (err) {
        alert("Connection issue — check your internet 🌐");
      } finally {
        submitBtn.classList.remove("loading");
        submitBtn.disabled = false;
        submitBtn.innerHTML = "Blast off! 🚀";
      }
    }

    document.getElementById("categoryFilter").addEventListener("change", (e) => {
      const selected = e.target.value.toLowerCase();
      const filtered = selected === "all" 
        ? allEvents 
        : allEvents.filter(ev => (ev.category || "Other").toLowerCase() === selected);
      renderEvents(filtered);
    });

    function getEmoji(title) {
      const t = title.toLowerCase();
      if (t.includes("sing") || t.includes("song")) return "🎤🎶";
      if (t.includes("prayer") || t.includes("meditat")) return "🙏✨";
      if (t.includes("yoga") || t.includes("move")) return "🧘‍♀️💫";
      return "🌟";
    }

    loadEvents();
  </script>
</body>
</html>
